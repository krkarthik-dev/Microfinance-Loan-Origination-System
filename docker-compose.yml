services:
  postgres:
    image: postgres:15-alpine
    container_name: los_postgres
    environment:
      POSTGRES_USER: los_user
      POSTGRES_PASSWORD: los_password
      POSTGRES_DB: los_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount the initialization script to create tables automatically
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    networks:
      - los_network

  kafka:
    image: apache/kafka:3.7.0
    container_name: los_kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    restart: unless-stopped
    networks:
      - los_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: los_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/los_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - postgres
      - kafka
    restart: unless-stopped
    networks:
      - los_network

  ml_scoring:
    build:
      context: ./ml_scoring
      dockerfile: Dockerfile
    container_name: los_ml_scoring
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - los_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: los_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - los_network

volumes:
  postgres_data:
  kafka_data:

networks:
  los_network:
    driver: bridge
